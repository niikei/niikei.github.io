<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本棚 | niikei</title>
    <meta name="description" content="Booklog と連携した本棚ページ。カテゴリやステータスで絞り込めます。">
    <script>
        (() => {
            try {
                const saved = localStorage.getItem("theme");
                const theme = saved === "light" || saved === "dark"
                    ? saved
                    : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
                document.documentElement.dataset.theme = theme;
            } catch { }
        })();
    </script>
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body>
    <header class="site-header">
        <div class="container site-header__inner">
            <a class="brand" href="index.html">
                <img class="brand__avatar" src="assets/images/niikei_personal_icon.png" alt="niikei">
                <span class="brand__name">niikei</span>
            </a>

            <nav class="nav" aria-label="メイン">
                <a href="index.html">ホーム</a>
                <a href="booklog.html" aria-current="page">本棚</a>
                <a href="music.html">音楽</a>
                <a href="posts.html">記事</a>
            </nav>

            <div class="nav__actions">
                <button id="theme-toggle" class="button button--ghost" type="button" aria-pressed="false">ダーク</button>
                <div class="social" aria-label="外部リンク">
                    <a href="https://github.com/niikei/" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                        <img src="assets/images/github_icon.png" alt="GitHub">
                    </a>
                    <a href="https://www.instagram.com/n11_ke1/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                        <img src="assets/images/instagram_icon.png" alt="Instagram">
                    </a>
                    <a href="https://zenn.dev/niikei/" target="_blank" rel="noopener noreferrer" aria-label="Zenn">
                        <img src="assets/images/zenn_icon.svg" alt="Zenn">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="card stack">
                <div>
                    <p class="eyebrow">Books</p>
                    <h1 class="section-title">本棚</h1>
                    <p class="section-lead">Booklog のデータを読み込み、ここで統一デザインで表示します。</p>
                </div>

                <div class="bookshelf-controls" aria-label="絞り込み">
                    <label class="field" for="category">
                        <span class="field__label">カテゴリ</span>
                        <select id="category" class="select">
                            <option value="0">すべて</option>
                            <option value="3670563">文芸書</option>
                            <option value="3670562">技術書</option>
                            <option value="3670565">人文書</option>
                            <option value="3670564">漫画</option>
                        </select>
                    </label>

                    <label class="field" for="status">
                        <span class="field__label">ステータス</span>
                        <select id="status" class="select">
                            <option value="0">すべて</option>
                            <option value="1">読みたい</option>
                            <option value="2">いま読んでる</option>
                            <option value="3">読み終わった</option>
                        </select>
                    </label>

                    <label class="field" for="count">
                        <span class="field__label">表示件数</span>
                        <select id="count" class="select">
                            <option value="12">12</option>
                            <option value="24" selected>24</option>
                            <option value="48">48</option>
                        </select>
                    </label>
                </div>

                <div id="bookshelf-status" class="muted" aria-live="polite"></div>
            </div>
        </section>

        <section class="section">
            <div id="bookshelf" class="book-grid" aria-live="polite"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div>&copy; 2026 niikei</div>
        </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/booklog.js"></script>
</body>

</html>
