<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本棚 | niikei</title>
    <meta
      name="description"
      content="Booklog と連携した本棚ページ。カテゴリやステータスで絞り込めます。"
    />
    <script src="assets/js/site/theme-bootstrap.js"></script>
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>

  <body data-page="booklog">
    <div data-site-header></div>

    <main class="container">
      <section class="hero">
        <div class="page-intro">
          <div class="page-intro__head">
            <p class="eyebrow">Books</p>
            <h1 class="page-intro__title">本棚</h1>
            <p class="page-intro__desc">
              Booklog のデータを読み込み、ここで統一デザインで表示します。
            </p>
          </div>
        </div>
        <div class="card stack bookshelf-panel">
          <div class="bookshelf-toolbar">
            <div class="bookshelf-toolbar__summary">
              <p class="eyebrow">絞り込み</p>
              <p
                id="bookshelf-filter-summary"
                class="bookshelf-summary muted"
              ></p>
            </div>

            <div class="bookshelf-layout" aria-label="表示切替">
              <span class="field__label">表示</span>
              <div
                class="bookshelf-layout__buttons"
                role="group"
                aria-label="本棚の表示切替"
              >
                <button
                  type="button"
                  class="button bookshelf-layout__button"
                  data-bookshelf-layout="grid"
                  aria-pressed="false"
                >
                  グリッド
                </button>
                <button
                  type="button"
                  class="button bookshelf-layout__button"
                  data-bookshelf-layout="list"
                  aria-pressed="false"
                >
                  リスト
                </button>
              </div>
            </div>
          </div>

          <details
            class="disclosure bookshelf-advanced"
            id="bookshelf-advanced"
          >
            <summary class="disclosure__summary">
              <span class="disclosure__label">詳細条件</span>
              <span class="disclosure__icon" aria-hidden="true"></span>
            </summary>
            <div class="bookshelf-controls" aria-label="絞り込み">
              <label class="field" for="category">
                <span class="field__label">カテゴリ</span>
                <select id="category" class="select">
                  <option value="0">すべて</option>
                  <option value="3670563">文芸書</option>
                  <option value="3670562">技術書</option>
                  <option value="3670565">人文書</option>
                  <option value="3670564">漫画</option>
                </select>
              </label>

              <label class="field" for="status">
                <span class="field__label">ステータス</span>
                <select id="status" class="select">
                  <option value="0">すべて</option>
                  <option value="1">読みたい</option>
                  <option value="2">いま読んでる</option>
                  <option value="3">読み終わった</option>
                </select>
              </label>

              <label class="field" for="count">
                <span class="field__label">表示件数</span>
                <select id="count" class="select">
                  <option value="12">12</option>
                  <option value="24" selected>24</option>
                  <option value="48">48</option>
                </select>
              </label>
            </div>
          </details>

          <div id="bookshelf-status" class="muted" aria-live="polite"></div>
        </div>
      </section>

      <section class="section">
        <div id="bookshelf" class="book-grid" aria-live="polite"></div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="assets/js/site/chrome.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/booklog.js"></script>
  </body>
</html>
