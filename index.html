<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>niikei</title>
    <meta
      name="description"
      content="niikei の個人サイト。ソフトウェア、読書、音楽の記録。"
    />
    <script src="assets/js/site/theme-bootstrap.js"></script>
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>

  <body data-page="home">
    <div data-site-header></div>

    <main class="container">
      <section class="hero hero--home">
        <img
          class="hero-icon hero-icon--home"
          src="assets/images/niikei_personal_icon.png"
          alt="niikei のアイコン"
        />

        <div class="hero-content">
          <div class="stack stack--lg">
            <div>
              <p class="eyebrow">Personal Site</p>
              <h1 class="hero-title">niikei</h1>
              <p class="hero-copy">
                ソフトウェア・読書・音楽を中心に、日々の記録をシンプルにまとめています。
              </p>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <article class="card feature">
          <img
            class="feature__image"
            src="assets/images/niikei_music_icon.png"
            alt="Music"
          />
          <div class="stack">
            <div>
              <p class="eyebrow">Music</p>
              <h2 class="section-title">音楽ページ</h2>
              <p class="section-lead">
                音楽タグの記事やメモをまとめた専用ページです。
              </p>
            </div>
            <div>
              <a class="button button--accent" href="music.html"
                >音楽ページを開く</a
              >
            </div>
          </div>
        </article>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">最新記事</h2>
          <a class="button" href="posts.html">記事一覧</a>
        </div>
        <div id="latest-posts" class="post-list" aria-live="polite"></div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="assets/js/site/chrome.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/site/posts-utils.js"></script>
    <script src="assets/js/site/posts-markdown.js"></script>
    <script src="assets/js/site/posts-data.js"></script>
    <script src="assets/js/site/posts-render.js"></script>
    <script src="assets/js/posts.js"></script>
  </body>
</html>
