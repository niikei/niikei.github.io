<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>niikei</title>
    <meta
      name="description"
      content="niikei の個人サイト。ソフトウェア、読書、音楽の記録。"
    />
    <script src="assets/js/site/theme-bootstrap.js"></script>
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>

  <body data-page="home">
    <div data-site-header></div>

    <main class="container">
      <section class="hero">
        <div class="hero-main">
          <div class="stack stack--lg">
            <div>
              <p class="eyebrow">Personal Site</p>
              <h1 class="hero-title">niikei</h1>
              <p class="hero-copy">
                ソフトウェア・読書・音楽を中心に、日々の記録をシンプルにまとめています。
              </p>
            </div>

            <div class="quick-links" aria-label="主要ページ">
              <a class="tile" href="posts.html">
                <div>
                  <div class="tile__title">記事</div>
                  <div class="tile__meta">Markdown で管理</div>
                </div>
                <span aria-hidden="true">→</span>
              </a>

              <a class="tile" href="booklog.html">
                <div>
                  <div class="tile__title">本棚</div>
                  <div class="tile__meta">Booklog 連携</div>
                </div>
                <span aria-hidden="true">→</span>
              </a>

              <a class="tile" href="music.html">
                <div>
                  <div class="tile__title">音楽</div>
                  <div class="tile__meta">音楽関連の記事</div>
                </div>
                <span aria-hidden="true">→</span>
              </a>
            </div>
          </div>

          <img
            class="hero-icon"
            src="assets/images/niikei_personal_icon.png"
            alt="niikei のアイコン"
          />
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">最新記事</h2>
          <a class="button" href="posts.html">記事一覧</a>
        </div>
        <div id="latest-posts" class="post-list" aria-live="polite"></div>
      </section>

      <section class="section">
        <article class="card feature">
          <img
            class="feature__image"
            src="assets/images/niikei_music_icon.png"
            alt="Music"
          />
          <div class="stack">
            <div>
              <p class="eyebrow">Music</p>
              <h2 class="section-title">音楽ページ</h2>
              <p class="section-lead">
                音楽タグの記事やメモをまとめた専用ページです。
              </p>
            </div>
            <div>
              <a class="button button--accent" href="music.html"
                >音楽ページを開く</a
              >
            </div>
          </div>
        </article>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="assets/js/site/chrome.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/posts.js"></script>
  </body>
</html>
