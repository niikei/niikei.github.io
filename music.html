<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音楽 | niikei</title>
    <meta
      name="description"
      content="niikei の音楽ページ。音楽タグの記事やメモをまとめています。"
    />
    <script src="assets/js/site/theme-bootstrap.js"></script>
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>

  <body data-page="music">
    <div data-site-header></div>

    <main class="container">
      <section class="hero">
        <div class="hero-main">
          <div class="stack stack--lg">
            <div>
              <p class="eyebrow">Music</p>
              <h1 class="hero-title">音楽メモ</h1>
              <p class="hero-copy">音楽関連の記事をここに集約しています。</p>
            </div>
          </div>

          <img
            class="hero-icon"
            src="assets/images/niikei_music_icon.png"
            alt="Music アイコン"
          />
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">音楽関連の記事</h2>
        </div>
        <div
          id="music-posts"
          class="post-list"
          data-posts-tag="music"
          data-posts-empty="音楽関連の記事はまだありません。posts/*.md に tags: music を付けて追加できます。"
          aria-live="polite"
        ></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">動画</h2>
        </div>
        <div
          id="music-videos"
          class="video-list"
          data-videos-empty="音楽関連の動画はまだありません。"
          aria-live="polite"
        ></div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="assets/js/site/chrome.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/site/posts-utils.js"></script>
    <script src="assets/js/site/posts-markdown.js"></script>
    <script src="assets/js/site/posts-data.js"></script>
    <script src="assets/js/site/posts-render.js"></script>
    <script src="assets/js/site/music-videos.js"></script>
    <script src="assets/js/posts.js"></script>
  </body>
</html>
