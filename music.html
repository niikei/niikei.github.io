<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音楽 | niikei</title>
    <meta name="description" content="niikei の音楽ページ。プレイリスト、メモ、音楽関連の記事。">
    <script>
        (() => {
            try {
                const saved = localStorage.getItem("theme");
                const theme = saved === "light" || saved === "dark"
                    ? saved
                    : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
                document.documentElement.dataset.theme = theme;
            } catch { }
        })();
    </script>
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body>
    <header class="site-header">
        <div class="container site-header__inner">
            <a class="brand" href="index.html">
                <img class="brand__avatar" src="assets/images/niikei_personal_icon.png" alt="niikei">
                <span class="brand__name">niikei</span>
            </a>

            <nav class="nav" aria-label="メイン">
                <a href="templates/booklog.html">本棚</a>
                <a href="music.html">音楽</a>
                <a href="posts.html">記事</a>
            </nav>

            <div class="nav__actions">
                <button id="theme-toggle" class="button button--ghost" type="button" aria-pressed="false">ダーク</button>
                <div class="social" aria-label="外部リンク">
                    <a href="https://github.com/niikei/" target="_blank" rel="noopener noreferrer">
                        <img src="assets/images/github_icon.png" alt="GitHub">
                    </a>
                    <a href="https://zenn.dev/niikei/" target="_blank" rel="noopener noreferrer">
                        <img src="assets/images/zenn_icon.svg" alt="Zenn">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero" style="padding-bottom: 0;">
            <div class="card">
                <div class="panel-hero">
                    <img class="panel-hero__icon" src="assets/images/niikei_music_icon.png" alt="Music">
                    <div>
                        <h1 class="panel-hero__title">Music</h1>
                        <p class="panel-hero__lead">音楽まわりのリンクとメモ。記事は <code>tags: music</code> で集約します。</p>
                        <div class="panel-links" style="margin-top: 14px;">
                            <a class="tile" href="templates/spotify.html">
                                <div>
                                    <div class="tile__title">Spotify</div>
                                    <div class="tile__meta">よく聴くもの</div>
                                </div>
                                <span aria-hidden="true">→</span>
                            </a>

                            <a class="tile" href="templates/youtube.html">
                                <div>
                                    <div class="tile__title">YouTube</div>
                                    <div class="tile__meta">お気に入り</div>
                                </div>
                                <span aria-hidden="true">→</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <h2 style="margin: 0 0 12px; font-size: 18px; letter-spacing: 0.02em;">音楽関連の記事</h2>
            <div id="music-posts" class="post-list" data-posts-tag="music"
                data-posts-empty="音楽関連の記事はまだありません。posts/*.md に tags: music を付けて追加できます。" aria-live="polite">
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div>&copy; 2024 niikei</div>
        </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/posts.js"></script>
</body>

</html>
