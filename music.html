<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音楽 | niikei</title>
    <meta name="description" content="niikei の音楽ページ。音楽タグの記事やメモをまとめています。">
    <script>
        (() => {
            try {
                const saved = localStorage.getItem("theme");
                const theme = saved === "light" || saved === "dark"
                    ? saved
                    : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
                document.documentElement.dataset.theme = theme;
            } catch { }
        })();
    </script>
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body>
    <header class="site-header">
        <div class="container site-header__inner">
            <a class="brand" href="index.html">
                <img class="brand__avatar" src="assets/images/niikei_personal_icon.png" alt="niikei">
                <span class="brand__name">niikei</span>
            </a>

            <nav class="nav" aria-label="メイン">
                <a class="icon-link" href="index.html" aria-label="ホーム" title="ホーム">
                    <i data-lucide="house" class="icon" aria-hidden="true"></i>
                </a>
                <a href="booklog.html">本棚</a>
                <a href="music.html" aria-current="page">音楽</a>
                <a href="posts.html">記事</a>
            </nav>

            <div class="nav__actions">
                <button id="theme-toggle" class="button button--ghost icon-button" type="button" aria-pressed="false"
                    aria-label="テーマ切り替え" title="テーマ切り替え">
                    <i data-lucide="moon" class="icon" aria-hidden="true"></i>
                </button>
                <div class="social" aria-label="外部リンク">
                    <a href="https://github.com/niikei/" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                        <img src="https://cdn.simpleicons.org/github" alt="GitHub">
                    </a>
                    <a href="https://www.instagram.com/n11_ke1/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                        <img src="https://cdn.simpleicons.org/instagram" alt="Instagram">
                    </a>
                    <a href="https://zenn.dev/niikei/" target="_blank" rel="noopener noreferrer" aria-label="Zenn">
                        <img src="https://cdn.simpleicons.org/zenn" alt="Zenn">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="hero-main">
                <div class="stack stack--lg">
                    <div>
                        <p class="eyebrow">Music</p>
                        <h1 class="hero-title">音楽メモ</h1>
                        <p class="hero-copy">音楽関連の記事をここに集約しています。記事ファイルに <code>tags: music</code> を付けると表示されます。</p>
                    </div>

                    <div class="quick-links" aria-label="音楽ページのリンク">
                        <a class="tile" href="posts.html">
                            <div>
                                <div class="tile__title">記事一覧</div>
                                <div class="tile__meta">全記事を見る</div>
                            </div>
                            <span aria-hidden="true">→</span>
                        </a>

                        <a class="tile" href="index.html">
                            <div>
                                <div class="tile__title">トップ</div>
                                <div class="tile__meta">ホームへ戻る</div>
                            </div>
                            <span aria-hidden="true">→</span>
                        </a>

                        <a class="tile" href="https://zenn.dev/niikei/" target="_blank" rel="noopener noreferrer">
                            <div>
                                <div class="tile__title">Zenn</div>
                                <div class="tile__meta">外部記事</div>
                            </div>
                            <span aria-hidden="true">↗</span>
                        </a>
                    </div>
                </div>

                <img class="hero-icon" src="assets/images/niikei_music_icon.png" alt="Music アイコン">
            </div>
        </section>

        <section class="section">
            <div class="section-head">
                <h2 class="section-title">音楽関連の記事</h2>
                <p class="section-lead">自動で抽出</p>
            </div>
            <div id="music-posts" class="post-list" data-posts-tag="music"
                data-posts-empty="音楽関連の記事はまだありません。posts/*.md に tags: music を付けて追加できます。" aria-live="polite"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div>&copy; 2026 niikei</div>
        </div>
    </footer>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/posts.js"></script>
</body>

</html>
