<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事 | niikei</title>
    <meta name="description" content="niikei の記事ページ。">
    <script>
        (() => {
            try {
                const saved = localStorage.getItem("theme");
                const theme = saved === "light" || saved === "dark"
                    ? saved
                    : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
                document.documentElement.dataset.theme = theme;
            } catch { }
        })();
    </script>
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body>
    <header class="site-header">
        <div class="container site-header__inner">
            <a class="brand" href="index.html">
                <img class="brand__avatar" src="assets/images/niikei_personal_icon.png" alt="niikei">
                <span class="brand__name">niikei</span>
            </a>

            <nav class="nav" aria-label="メイン">
                <a class="icon-link" href="index.html" aria-label="ホーム" title="ホーム">
                    <i data-lucide="house" class="icon" aria-hidden="true"></i>
                </a>
                <a href="booklog.html">本棚</a>
                <a href="music.html">音楽</a>
                <a href="posts.html" aria-current="page">記事</a>
            </nav>

            <div class="nav__actions">
                <button id="theme-toggle" class="button button--ghost icon-button" type="button" aria-pressed="false"
                    aria-label="テーマ切り替え" title="テーマ切り替え">
                    <i data-lucide="moon" class="icon" aria-hidden="true"></i>
                </button>
                <div class="social" aria-label="外部リンク">
                    <a href="https://github.com/niikei/" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                        <img src="assets/images/github_icon.png" alt="GitHub">
                    </a>
                    <a href="https://www.instagram.com/n11_ke1/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                        <img src="assets/images/instagram_icon.png" alt="Instagram">
                    </a>
                    <a href="https://zenn.dev/niikei/" target="_blank" rel="noopener noreferrer" aria-label="Zenn">
                        <img src="assets/images/zenn_icon.svg" alt="Zenn">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="card stack">
                <div>
                    <a class="button button--ghost" href="posts.html">← 記事一覧へ戻る</a>
                </div>
                <h1 id="post-title" class="section-title"></h1>
                <div id="post-date" class="post-item__date"></div>
            </div>
        </section>

        <section class="section">
            <article class="card prose">
                <div id="post-content"></div>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div>&copy; 2026 niikei</div>
        </div>
    </footer>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/posts.js"></script>
</body>

</html>
