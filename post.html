<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事 | niikei</title>
    <meta name="description" content="niikei の記事（Markdown 管理）。">
    <script>
        (() => {
            try {
                const saved = localStorage.getItem("theme");
                const theme = saved === "light" || saved === "dark"
                    ? saved
                    : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
                document.documentElement.dataset.theme = theme;
            } catch { }
        })();
    </script>
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body>
    <header class="site-header">
        <div class="container site-header__inner">
            <a class="brand" href="index.html">
                <img class="brand__avatar" src="assets/images/logo.jpg" alt="niikei">
                <span class="brand__name">niikei</span>
            </a>

            <nav class="nav" aria-label="メイン">
                <a href="templates/booklog.html">本棚</a>
                <a href="templates/youtube.html">YouTube</a>
                <a href="templates/spotify.html">Spotify</a>
                <a href="posts.html">記事</a>
            </nav>

            <div class="nav__actions">
                <button id="theme-toggle" class="button button--ghost" type="button" aria-pressed="false">ダーク</button>
                <div class="social" aria-label="外部リンク">
                    <a href="https://github.com/niikei/" target="_blank" rel="noopener noreferrer">
                        <img src="assets/images/github_icon.png" alt="GitHub">
                    </a>
                    <a href="https://zenn.dev/niikei/" target="_blank" rel="noopener noreferrer">
                        <img src="assets/images/zenn_icon.svg" alt="Zenn">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero" style="padding-bottom: 0;">
            <div class="card">
                <a href="posts.html" style="color: var(--muted); text-decoration: none;">← 記事一覧</a>
                <h1 id="post-title" style="margin: 12px 0 6px;"></h1>
                <div id="post-date" class="post-item__date"></div>
            </div>
        </section>

        <section class="section">
            <article class="card prose">
                <div id="post-content"></div>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div>&copy; 2024 niikei</div>
        </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/posts.js"></script>
</body>

</html>
