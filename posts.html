<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>記事 | niikei</title>
    <meta name="description" content="niikei の記事一覧（Markdown 管理）。" />
    <script src="assets/js/site/theme-bootstrap.js"></script>
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>

  <body data-page="posts">
    <div data-site-header></div>

    <main class="container">
      <section class="hero">
        <div class="card stack">
          <p class="eyebrow">Posts</p>
          <h1 class="section-title">記事一覧</h1>
          <p class="section-lead">
            記事は <code>posts/*.md</code> に追加すると自動で読み込まれます。
          </p>
        </div>
      </section>

      <section class="section">
        <div id="all-posts" class="post-list" aria-live="polite"></div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="assets/js/site/chrome.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/posts.js"></script>
  </body>
</html>
